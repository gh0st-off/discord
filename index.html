
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1.5rem 0; max-width: 620px; margin: 0 auto; }
h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px; }
input[type=text] { width: 100%; font-size: 14px; }
.dropzone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; }
.dropzone.over { background: var(--color-background-secondary); }
.dropzone-icon { width: 32px; height: 32px; margin: 0 auto 10px; opacity: 0.4; }
.dropzone p { font-size: 14px; color: var(--color-text-secondary); }
.dropzone span { font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px; display: block; }
#file-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 8px; }
.file-item { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
.file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.file-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
.file-size { font-size: 12px; color: var(--color-text-tertiary); }
.progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: #534AB7; border-radius: 99px; transition: width 0.2s; }
.status-text { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }
.btn-send { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; background: #534AB7; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer; transition: opacity 0.15s; }
.btn-send:hover { opacity: 0.88; }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
.log { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-mono); max-height: 140px; overflow-y: auto; line-height: 1.7; margin-top: 1rem; display: none; }
.log.visible { display: block; }
.log-ok { color: #1D9E75; }
.log-err { color: #E24B4A; }
.remove-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; line-height: 1; padding: 0 0 0 8px; }
.remove-btn:hover { color: var(--color-text-primary); }
</style>

<div id="app">
  <h2>Discord File Uploader</h2>
  <p class="sub">Colle ton webhook, glisse tes fichiers — ils sont découpés et envoyés directement.</p>

  <div class="card">
    <label>URL du Webhook Discord</label>
    <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/..." />
  </div>

  <div class="card">
    <label>Fichiers à envoyer</label>
    <div class="dropzone" id="dropzone">
      <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 8l4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Glisse tes fichiers ici</p>
      <span>ou clique pour sélectionner — taille illimitée</span>
      <input type="file" id="file-input" multiple style="display:none" />
    </div>
    <div id="file-list"></div>
  </div>

  <button class="btn-send" id="send-btn" disabled>Envoyer sur Discord</button>
  <div class="log" id="log"></div>
</div>

<script>
const CHUNK_SIZE = 24 * 1024 * 1024;
let files = [];

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const sendBtn = document.getElementById('send-btn');
const webhookInput = document.getElementById('webhook');
const log = document.getElementById('log');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('over'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => addFiles(fileInput.files));

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (files.find(x => x.name === f.name && x.size === f.size)) continue;
    files.push(f);
  }
  renderList();
  updateBtn();
}

function removeFile(idx) {
  files.splice(idx, 1);
  renderList();
  updateBtn();
}

function renderList() {
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.id = 'file-' + i;
    const chunks = Math.ceil(f.size / CHUNK_SIZE);
    const sizeStr = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1) + ' MB' : (f.size/1024).toFixed(0) + ' KB';
    item.innerHTML = `
      <div class="file-header">
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span style="display:flex;align-items:center;gap:4px">
          <span class="file-size">${sizeStr} · ${chunks} chunk${chunks>1?'s':''}</span>
          <button class="remove-btn" onclick="removeFile(${i})">×</button>
        </span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
      <div class="status-text" id="status-${i}">En attente</div>
    `;
    fileList.appendChild(item);
  });
}

function updateBtn() {
  sendBtn.disabled = files.length === 0;
}

function addLog(msg, type) {
  log.classList.add('visible');
  const line = document.createElement('div');
  line.className = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : '';
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function setProgress(idx, pct, statusText) {
  const bar = document.getElementById('prog-' + idx);
  const st = document.getElementById('status-' + idx);
  if (bar) bar.style.width = pct + '%';
  if (st) st.textContent = statusText;
}

async function uploadChunk(webhookUrl, chunk, filename, chunkIndex, totalChunks) {
  const label = totalChunks > 1 ? `${filename}.part${String(chunkIndex+1).padStart(3,'0')}` : filename;
  const form = new FormData();
  const content = totalChunks > 1
    ? `📦 **${filename}** — chunk ${chunkIndex+1}/${totalChunks}`
    : `📁 **${filename}**`;
  form.append('payload_json', JSON.stringify({ content }));
  form.append('file', new Blob([chunk]), label);

  const res = await fetch(webhookUrl + '?wait=true', { method: 'POST', body: form });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`HTTP ${res.status}: ${t.slice(0,120)}`);
  }
  return await res.json();
}

async function processFile(file, idx, webhookUrl) {
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  addLog(`▶ ${file.name} — ${totalChunks} chunk(s)`, '');

  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const end = Math.min(start + CHUNK_SIZE, file.size);
    const chunk = await file.slice(start, end).arrayBuffer();
    setProgress(idx, Math.round((i / totalChunks) * 90), `Chunk ${i+1}/${totalChunks} en envoi...`);
    try {
      await uploadChunk(webhookUrl, chunk, file.name, i, totalChunks);
      addLog(`  ✓ chunk ${i+1}/${totalChunks}`, 'ok');
    } catch(e) {
      addLog(`  ✗ chunk ${i+1}: ${e.message}`, 'err');
      setProgress(idx, 0, '✗ Erreur — vérifiez le webhook');
      throw e;
    }
    await new Promise(r => setTimeout(r, 600));
  }

  setProgress(idx, 100, totalChunks > 1 ? `✓ Envoyé en ${totalChunks} chunks` : '✓ Envoyé');
  addLog(`✓ ${file.name} terminé`, 'ok');
}

sendBtn.addEventListener('click', async () => {
  const webhook = webhookInput.value.trim();
  if (!webhook.startsWith('https://discord.com/api/webhooks/') && !webhook.startsWith('https://discordapp.com/api/webhooks/')) {
    addLog('✗ URL webhook invalide — doit commencer par https://discord.com/api/webhooks/', 'err');
    return;
  }
  sendBtn.disabled = true;
  sendBtn.textContent = 'Envoi en cours...';
  log.innerHTML = '';

  for (let i = 0; i < files.length; i++) {
    try {
      await processFile(files[i], i, webhook);
    } catch(e) {
      addLog(`Arrêt sur ${files[i].name}`, 'err');
    }
  }

  sendBtn.disabled = false;
  sendBtn.textContent = 'Envoyer sur Discord';
  addLog('— Terminé —', '');
});
</script>
